name: CI
on:
  pull_request:
    branches: [main, develop]
jobs:
  build:
    # Lint + tests + build : contrôle générique déjà joué sur les PR vers develop.
    # Inutile de le rejouer à l'identique sur la promotion develop → main (le code
    # y est déjà passé). On limite donc ce job aux PR vers develop.
    if: github.base_ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      # Tests unitaires + composants (Vitest) + couverture. Rapides, Supabase mocké,
      # hors ligne. L'E2E (Playwright) est volontairement séparé car plus lourd —
      # voir e2e/README.md.
      - run: npm run test:coverage
      # Publication de la couverture sur Codecov (repo public : aucun token requis).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      - run: npm run build
  migration-check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ github.base_ref == 'main' && secrets.PROD_DB_PASSWORD || secrets.DEV_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ github.base_ref == 'main' && secrets.PROD_PROJECT_ID || secrets.DEV_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v3
        with:
          version: latest
      - run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - run: supabase db push --dry-run
