name: "DAST — ZAP baseline (gate promotion prod)"

# Gate DAST (Dynamic Application Security Testing) sur la PROMOTION en production.
#
# On scanne au moment d'une PR develop → main (promotion vers la prod). À ce stade,
# la preview develop est déjà déployée et stable : on la scanne via son URL fixe.
# Le job étant un check de PR classique (base main), il apparaît directement comme
# status check sur la PR — pas besoin de republier un commit status via l'API.
#
# Gate : bloquant sur les alertes High (riskcode 3) ; Medium/Low/Informational sont
# rapportés sans bloquer. Le tri fin se fait en analysant le rapport JSON de ZAP
# (les rules ZAP sont par identifiant de règle, pas par niveau de risque — parser
# le JSON par `riskcode` est la façon fiable d'exprimer « FAIL sur High seulement »).
on:
  # PR dont la BASE est main → c.-à-d. les PR develop → main (promotion prod).
  pull_request:
    branches: [main]
  # Test manuel ad hoc.
  workflow_dispatch:

# contents:read suffit (checkout de la config ZAP). Pas de statuses:write : le verdict
# du job EST le check de PR ; pas d'issues:write : ce workflow est un gate.
permissions:
  contents: read

env:
  # URL stable de la preview develop (alias de branche Cloudflare Pages). Déjà en
  # ligne au moment de la PR de promotion → cible fixe, pas d'URL dynamique.
  PREVIEW_URL: "https://develop.claude-sandbox-c7l.pages.dev/"

jobs:
  zap:
    # ⬇️ Ce `name:` est le nom du check à ajouter aux required status checks de main.
    name: DAST ZAP (preview develop, High bloquant)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (config ZAP)
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.PREVIEW_URL }}
          # On NE laisse PAS l'action décider du pass/fail : le gating fin (High
          # bloquant, reste non bloquant) est calculé à partir du rapport JSON.
          fail_action: false
          # Pas d'issue GitHub auto : ce workflow est un gate.
          allow_issue_writing: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyse du rapport (High = bloquant)
        id: triage
        run: |
          set -euo pipefail
          report="$(find "${GITHUB_WORKSPACE}" -maxdepth 3 -name 'report_json.json' | head -n1)"
          if [ -z "${report}" ] || [ ! -s "${report}" ]; then
            echo "Rapport ZAP introuvable — le scan a probablement échoué (site injoignable ?)." >&2
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          # riskcode : 3=High, 2=Medium, 1=Low, 0=Informational.
          high=$(jq   '[.site[].alerts[]? | select(.riskcode=="3")] | length' "${report}")
          medium=$(jq '[.site[].alerts[]? | select(.riskcode=="2")] | length' "${report}")
          low=$(jq    '[.site[].alerts[]? | select(.riskcode=="1")] | length' "${report}")
          info=$(jq   '[.site[].alerts[]? | select(.riskcode=="0")] | length' "${report}")
          {
            echo "high=$high"
            echo "medium=$medium"
            echo "low=$low"
            echo "info=$info"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Résultat ZAP — preview develop (gate promotion prod)"
            echo ""
            echo "| Risque | Nb |"
            echo "|---|---|"
            echo "| 🔴 High | $high |"
            echo "| 🟠 Medium | $medium |"
            echo "| 🟡 Low | $low |"
            echo "| ⚪ Informational | $info |"
            echo ""
            if [ "$high" -gt 0 ]; then
              echo "**Gate : ÉCHEC** — $high alerte(s) High bloquante(s) :"
              echo ""
              jq -r '.site[].alerts[]? | select(.riskcode=="3") | "- \(.name) — \(.riskdesc)"' "${report}"
            else
              echo "**Gate : OK** — aucune alerte High. Medium/Low/Info rapportés sans bloquer."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gate — échec si High (ou scan non concluant)
        run: |
          set -euo pipefail
          if [ "${{ steps.triage.outputs.found }}" != "true" ]; then
            echo "Scan ZAP non concluant (rapport manquant) → échec." >&2
            exit 1
          fi
          high="${{ steps.triage.outputs.high }}"
          if [ "${high:-0}" -gt 0 ]; then
            echo "❌ ${high} alerte(s) High → gate bloquant (promotion refusée)." >&2
            exit 1
          fi
          echo "✅ Aucune alerte High — gate franchi."
