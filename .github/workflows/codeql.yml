name: "CodeQL"

on:
  # On n'analyse QUE les PR vers develop : le code n'est scanné qu'une seule fois,
  # à l'entrée de develop. Aucun re-scan au merge (ni develop ni main) — le code y
  # est déjà celui qui a été analysé. Le schedule hebdomadaire couvre la prod.
  pull_request:
    branches: [develop]
  schedule:
    # Analyse hebdomadaire : chaque lundi à 06h00 UTC
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyse CodeQL
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Initialisation de CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
