name: "CodeQL"

on:
  push:
    branches: [main, develop]
  # Sur les PR, on n'analyse que celles vers develop : la promotion develop → main
  # rejouerait à l'identique une analyse déjà faite. Le push sur main (au merge) et
  # le schedule hebdomadaire couvrent la prod.
  pull_request:
    branches: [develop]
  schedule:
    # Analyse hebdomadaire : chaque lundi à 06h00 UTC
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyse CodeQL
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v7

      - name: Initialisation de CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
