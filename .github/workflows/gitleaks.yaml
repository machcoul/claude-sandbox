name: gitleaks
on:
  # Un secret exposé est le risque le plus grave et irréversible : on scanne donc
  # dès le push d'une branche de feature (détection précoce), pour l'attraper au
  # plus tôt. On exclut main ET develop du push car ces branches sont protégées
  # (aucun push direct possible) et leur contenu y arrive déjà via une PR scannée →
  # re-scanner au merge serait redondant. Le pull_request:[develop] couvre l'entrée
  # dans develop.
  pull_request:
    branches: [develop]
  push:
    branches-ignore: [main, develop]
  # Permet aussi un scan complet à la demande depuis l'onglet Actions
  workflow_dispatch:
# Sur les events pull_request, l'action liste les commits de la PR via l'API
# GitHub : il lui faut donc l'accès en lecture aux PR (sinon 403).
permissions:
  contents: read
  pull-requests: read
jobs:
  scan:
    name: Détection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 récupère TOUT l'historique Git, pour que gitleaks
          # puisse le scanner en entier (et pas seulement le dernier commit).
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Licence requise UNIQUEMENT si le dépôt appartient à une organisation
          # GitHub. Pour un compte perso, laisser commenté.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
